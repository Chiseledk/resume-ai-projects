<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音门禁系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-register {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            box-shadow: 0 4px 20px rgba(238, 90, 36, 0.4);
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(238, 90, 36, 0.5);
        }
        .btn-monitor {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 184, 148, 0.4);
        }
        .btn-monitor:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 184, 148, 0.5);
        }
        .btn-icon {
            font-size: 24px;
        }
        .status-bar {
            margin-top: 40px;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }
        .status-bar span {
            color: #00d4ff;
            font-weight: 600;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>语音门禁系统</h1>
        <p class="subtitle">Voice Access Control System</p>

        <div class="btn-group">
            <a href="/register" class="btn btn-register">
                <span class="btn-icon">📝</span>
                <span>A. 进入注册</span>
            </a>
            <a href="/monitor" class="btn btn-monitor">
                <span class="btn-icon">👁️</span>
                <span>B. 进入监听</span>
            </a>
        </div>

        <div class="status-bar">
            已注册用户: <span id="userCount">加载中...</span> 人
        </div>

        <div class="footer">Powered by FunASR · Flask</div>
    </div>

    <script>
        fetch('/api/users/count')
            .then(r => r.json())
            .then(d => {
                document.getElementById('userCount').textContent = d.count;
            })
            .catch(() => {
                document.getElementById('userCount').textContent = '?';
            });
    </script>
</body>
</html>
